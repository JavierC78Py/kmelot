server {
    server_name    kmelot.online www.kmelot.online;
    #root           /usr/share/nginx/html/kmelot.online;
    #index          index.html;
    #try_files $uri /index.html;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kmelot.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kmelot.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    location / {
        rewrite ^/$ /ords/f?p=100:: permanent;
    }

    location /ords/ {
        proxy_pass https://gc42a911feb841d-dbkmelot.adb.sa-santiago-1.oraclecloudapps.com/ords/; 
        proxy_set_header Origin "";
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600;
        proxy_send_timeout    600;
        proxy_read_timeout    600;
        send_timeout          600;
    }

