# Redirección HTTP -> HTTPS para kmelot.online y www.kmelot.online
server {
    if ($host = www.kmelot.online) {
        return 301 https://$host$request_uri; 
    } # managed by Certbot

    if ($host = kmelot.online) {
        return 301 https://$host$request_uri; 
    } # managed by Certbot

    listen         80;
    listen         [::]:80;
    server_name    kmelot.online www.kmelot.online;
    return 404; # managed by Certbot
}

